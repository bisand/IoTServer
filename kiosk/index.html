<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bogenhuset">
  <title>Bogenhuset - Weather</title>
  <!-- Home-screen / PWA icon (Grafana logo, served same-origin from this kiosk) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="fav32.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111217">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111217; overflow: hidden; }
    /* Center the dashboard strip vertically; letterbox bars share the page background. */
    body { display: flex; align-items: center; justify-content: center; }
    /* Render is 1300px wide with the toolbar hidden at the source
       (_dash.hideTimePicker). With the h9 graph rows the content spans
       y=6..932; only the bottom watermark strip is cropped:
         height = (932-6)/1300 = 71.2vw, top crop = 6/1300 = 0.46vw.
       On a 4:3 screen (75vw tall) that fills ~95% of the height. */
    #wrap { width: 100vw; height: 71.2vw; overflow: hidden; }
    #dash { width: 100vw; margin-top: -0.46vw; display: block; }
    #msg  { position: fixed; top: 2px; right: 4px; color: #444;
            font: 11px -apple-system, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="wrap"><img id="dash" alt=""></div>
  <div id="msg">…</div>

  <script>
    // Server-rendered dashboard PNG. No Grafana JS runs here, so old Safari is fine.
    // Rendered at 1300px — the sweet spot between 1000 (text too big) and 1800 (band
    // too short): ~78% screen fill on a 4:3 iPad with comfortably small text. The page
    // scales the image to the screen width and centers it (dark letterbox bars).
    // To adjust: change the width here, then update #wrap height / margin-top above
    // (crop points scale as 62/W and 824/W) and bump the kiosk_index config hash.
    var BASE = 'https://grafana.bogenhuset.no/render/d/UN3ppwrik/bogenhuset-weather'
             + '?orgId=1&kiosk&_dash.hideTimePicker=true&theme=dark&tz=Europe/Oslo&width=1300&height=1000';
    var REFRESH_MS = 10000; // start a fresh render every 10s

    var img = document.getElementById('dash');
    var msg = document.getElementById('msg');
    var loading = false;

    function reload() {
      if (loading) return;              // never stack renders if one is still in flight
      loading = true;
      msg.textContent = '…';
      var next = new Image();           // double-buffer: preload off-screen
      next.onload = function () {        // swap in only when fully loaded -> no flicker
        img.src = next.src;
        msg.textContent = '';
        loading = false;
      };
      next.onerror = function () {
        msg.textContent = 'retry';
        loading = false;
      };
      next.src = BASE + '&t=' + new Date().getTime(); // cache-bust each render
    }

    reload();
    setInterval(reload, REFRESH_MS);
  </script>
</body>
</html>
