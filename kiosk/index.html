<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bogenhuset">
  <title>Bogenhuset - Weather</title>
  <!-- Home-screen / PWA icon (Grafana logo, served same-origin from this kiosk) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="fav32.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111217">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111217; overflow: hidden; }
    /* Center the dashboard strip vertically; letterbox bars share the page background. */
    body { display: flex; align-items: center; justify-content: center; }
    /* Layout viewport is 1300px wide (small axis text), toolbar hidden at the
       source. Content band spans y=6..772 (766px). The band is stretched to
       fill the full 4:3 screen (75vw tall): width scales to 100vw, height is
       scaled by 75/ (766/1300*100) ~ 1.27x vertically. Slightly non-uniform on
       purpose -- fills the screen completely with the smaller text.
         image display height = 900/766 * 75vw = 88.12vw
         top crop            = 6/766 * 75vw   = 0.59vw  */
    #wrap { width: 100vw; height: 75vw; overflow: hidden; }
    #dash { width: 100vw; height: 88.12vw; margin-top: -0.59vw; display: block; }
    #msg  { position: fixed; top: 2px; right: 4px; color: #444;
            font: 11px -apple-system, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="wrap"><img id="dash" alt=""></div>
  <div id="msg">…</div>

  <script>
    // Server-rendered dashboard PNG. No Grafana JS runs here, so old Safari is fine.
    // 1300-wide layout for small axis text, scale=2 for crispness; the CSS above
    // stretches the band to fill the whole screen (non-uniform, intentional).
    // Text-size dial: raise width for smaller text / more vertical stretch,
    // lower it for the opposite. Then re-measure the band (top/bottom y in the
    // layout), update the #wrap/#dash numbers and bump the kiosk_index hash.
    var BASE = 'https://grafana.bogenhuset.no/render/d/UN3ppwrik/bogenhuset-weather'
             + '?orgId=1&kiosk&_dash.hideTimePicker=true&theme=dark&tz=Europe/Oslo&width=1300&height=900&scale=2';
    var REFRESH_MS = 10000; // start a fresh render every 10s

    var img = document.getElementById('dash');
    var msg = document.getElementById('msg');
    var loading = false;

    function reload() {
      if (loading) return;              // never stack renders if one is still in flight
      loading = true;
      msg.textContent = '…';
      var next = new Image();           // double-buffer: preload off-screen
      next.onload = function () {        // swap in only when fully loaded -> no flicker
        img.src = next.src;
        msg.textContent = '';
        loading = false;
      };
      next.onerror = function () {
        msg.textContent = 'retry';
        loading = false;
      };
      next.src = BASE + '&t=' + new Date().getTime(); // cache-bust each render
    }

    reload();
    setInterval(reload, REFRESH_MS);
  </script>
</body>
</html>
