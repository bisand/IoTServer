<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bogenhuset">
  <title>Bogenhuset - Weather</title>
  <!-- Home-screen / PWA icon (Grafana logo, served same-origin from this kiosk) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="fav32.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111217">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111217; overflow: hidden; }
    /* Center the dashboard strip vertically; letterbox bars share the page background. */
    body { display: flex; align-items: center; justify-content: center; }
    /* Layout viewport is 1024px wide (toolbar hidden at the source), where the
       content band spans y=8..772 -> 1024:764 = 1.34, matching the iPad's 4:3
       screen to within 0.5%. Rendered with scale=2 the PNG is 2048px wide --
       the iPad's native panel resolution -- so it displays pixel-perfect.
       All crop math uses the 1024 layout coordinates:
         height = (772-8)/1024 = 74.6vw, top crop = 8/1024 = 0.78vw. */
    #wrap { width: 100vw; height: 74.6vw; overflow: hidden; }
    #dash { width: 100vw; margin-top: -0.78vw; display: block; }
    #msg  { position: fixed; top: 2px; right: 4px; color: #444;
            font: 11px -apple-system, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <div id="wrap"><img id="dash" alt=""></div>
  <div id="msg">…</div>

  <script>
    // Server-rendered dashboard PNG. No Grafana JS runs here, so old Safari is fine.
    // 1024-wide layout whose content band matches the iPad's 4:3 screen, rendered
    // at scale=2 for a native-resolution (2048px) crisp image that fills the screen.
    // To adjust: change width here, re-measure the band, update #wrap height /
    // margin-top above and bump the kiosk_index config hash in docker-compose.yml.
    var BASE = 'https://grafana.bogenhuset.no/render/d/UN3ppwrik/bogenhuset-weather'
             + '?orgId=1&kiosk&_dash.hideTimePicker=true&theme=dark&tz=Europe/Oslo&width=1024&height=860&scale=2';
    var REFRESH_MS = 10000; // start a fresh render every 10s

    var img = document.getElementById('dash');
    var msg = document.getElementById('msg');
    var loading = false;

    function reload() {
      if (loading) return;              // never stack renders if one is still in flight
      loading = true;
      msg.textContent = '…';
      var next = new Image();           // double-buffer: preload off-screen
      next.onload = function () {        // swap in only when fully loaded -> no flicker
        img.src = next.src;
        msg.textContent = '';
        loading = false;
      };
      next.onerror = function () {
        msg.textContent = 'retry';
        loading = false;
      };
      next.src = BASE + '&t=' + new Date().getTime(); // cache-bust each render
    }

    reload();
    setInterval(reload, REFRESH_MS);
  </script>
</body>
</html>
