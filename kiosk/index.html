<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Bogenhuset">
  <title>Bogenhuset - Weather</title>
  <!-- Home-screen / PWA icon (Grafana logo, served same-origin from this kiosk) -->
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" href="fav32.png">
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#111217">
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111217; overflow: hidden; }
    /* The render is requested at 1300x975 = 4:3, same aspect as the iPad screen,
       with &autofitpanels making the panel grid fill the frame. So the page is
       just a normal image scaled uniformly to the viewport - nothing else. */
    #dash { width: 100vw; height: 100vh; object-fit: contain; display: block; }
    #msg  { position: fixed; top: 2px; right: 4px; color: #444;
            font: 11px -apple-system, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <img id="dash" alt="">
  <div id="msg">…</div>

  <script>
    // Server-rendered dashboard PNG. No Grafana JS runs here, so old Safari is fine.
    // Render size is computed from this device's screen so the image always has
    // the screen's exact aspect ratio. The dashboard grid itself is sized to be
    // ~4:3 (h12 graph rows), so the content fills the frame natively -- no
    // autofitpanels (it applies too late in the renderer and is unreliable).
    // TEXT_FACTOR is the one dial: 1.0 renders at the screen's CSS resolution
    // (biggest text), higher renders a larger layout => smaller text.
    // (Grafana has no dynamic font sizing, so this factor IS the font control.)
    var TEXT_FACTOR = 1.53; // 1024 * 1.53 = 1567 on the iPad ~ the approved look
    // Orientation guard: older iPadOS Safari can report screen.width/height in
    // portrait regardless of how the device is held. The kiosk is landscape, so
    // always treat the longer side as the width.
    var sw = Math.max(screen.width, screen.height);
    var sh = Math.min(screen.width, screen.height);
    var w = Math.round(sw * TEXT_FACTOR);
    var h = Math.round(w * sh / sw);
    var BASE = 'https://grafana.bogenhuset.no/render/d/UN3ppwrik/bogenhuset-weather'
             + '?orgId=1&kiosk&_dash.hideTimePicker=true&theme=dark&tz=Europe/Oslo'
             + '&width=' + w + '&height=' + h;
    var REFRESH_MS = 10000; // start a fresh render every 10s

    var img = document.getElementById('dash');
    var msg = document.getElementById('msg');
    var loading = false;

    function reload() {
      if (loading) return;              // never stack renders if one is still in flight
      loading = true;
      msg.textContent = '…';
      var next = new Image();           // double-buffer: preload off-screen
      next.onload = function () {        // swap in only when fully loaded -> no flicker
        img.src = next.src;
        msg.textContent = '';
        loading = false;
      };
      next.onerror = function () {
        msg.textContent = 'retry';
        loading = false;
      };
      next.src = BASE + '&t=' + new Date().getTime(); // cache-bust each render
    }

    reload();
    setInterval(reload, REFRESH_MS);
  </script>
</body>
</html>
