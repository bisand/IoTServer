<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <title>Bogenhuset - Weather</title>
  <style>
    html, body { margin: 0; padding: 0; height: 100%; background: #111217; overflow: hidden; }
    /* Fill the width; the negative top margin crops Grafana's time-picker header.
       Content aspect (~4:3) fills a landscape iPad top-to-bottom; the "Powered by
       Grafana" watermark sits just below the bottom edge and is clipped by overflow. */
    #dash { position: absolute; top: 0; left: 0; width: 100vw; margin-top: -6.6vw; display: block; }
    #msg  { position: fixed; top: 2px; right: 4px; color: #444;
            font: 11px -apple-system, Helvetica, Arial, sans-serif; }
  </style>
</head>
<body>
  <img id="dash" alt="">
  <div id="msg">…</div>

  <script>
    // Server-rendered dashboard PNG. No Grafana JS runs here, so old Safari is fine.
    // Rendered narrow (1000px) on purpose: it makes the wide dashboard ~4:3 so it fills
    // a landscape screen and scales up bigger. The header is cropped in CSS above.
    var BASE = 'https://grafana.bogenhuset.no/render/d/UN3ppwrik/bogenhuset-weather'
             + '?orgId=1&kiosk&theme=dark&tz=Europe/Oslo&width=1000&height=820';
    var REFRESH_MS = 10000; // start a fresh render every 10s

    var img = document.getElementById('dash');
    var msg = document.getElementById('msg');
    var loading = false;

    function reload() {
      if (loading) return;              // never stack renders if one is still in flight
      loading = true;
      msg.textContent = '…';
      var next = new Image();           // double-buffer: preload off-screen
      next.onload = function () {        // swap in only when fully loaded -> no flicker
        img.src = next.src;
        msg.textContent = '';
        loading = false;
      };
      next.onerror = function () {
        msg.textContent = 'retry';
        loading = false;
      };
      next.src = BASE + '&t=' + new Date().getTime(); // cache-bust each render
    }

    reload();
    setInterval(reload, REFRESH_MS);
  </script>
</body>
</html>
