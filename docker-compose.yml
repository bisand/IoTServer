version: '3.8'

services:
  mosquitto:
    image: eclipse-mosquitto:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - /mnt/docker/iotserver/mosquitto/data:/mosquitto/data
      - /mnt/docker/iotserver/mosquitto/log:/mosquitto/log
      - /mnt/docker/iotserver/mosquitto/config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - app-net
      - backend-network

  influxdb:
    image: influxdb:1.11-alpine
    user: '0' # 1.8 wrote data as root; 1.11 runs as UID 1500 and can't write the root-owned volume
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    volumes:
      - /mnt/docker/iotserver/influxdb/data:/var/lib/influxdb
    networks:
      - app-net
      - backend-network

  nodered:
    image: nodered/node-red:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    user: '0'
    links:
      - influxdb
      - mosquitto
    ports:
      - 1880:1880
    volumes:
      - /mnt/docker/iotserver/nodered/data:/data
    networks:
      - app-net
      - backend-network

  grafana:
    # Stepwise upgrade from 7.0.6 (legacy iOS no longer supported). Bump one hop at a time, wait for a
    # clean start, verify the UI, then move to the next: 7.5.17 -> 8.5.27 -> 9.5.21 -> 10.4.19 -> 11.6.16 -> 12.4.5 -> 13.1.0
    image: grafana/grafana:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: 'true'
      GF_AUTH_ANONYMOUS_ORG_ROLE: 'Viewer'
      GF_SECURITY_ALLOW_EMBEDDING: 'true'
      # Revert InfluxQL query handling to the frontend path; the backend migration path
      # returns HTTP 400 on the legacy queries carried over from Grafana 7.
      GF_FEATURE_TOGGLES_INFLUXDBBACKENDMIGRATION: 'false'
      # Server-side PNG rendering for the legacy-iPad kiosk (Safari 15 can't run the GF13 frontend).
      GF_RENDERING_SERVER_URL: http://renderer:8081/render
      GF_RENDERING_CALLBACK_URL: http://grafana:3000/
      GF_LOG_FILTERS: rendering:info
      # Shared secret between Grafana and the renderer; GF13 blocks the default token in prod.
      # Must equal the renderer's AUTH_TOKEN below. Rotate this / move to a Portainer secret if you like.
      GF_RENDERING_RENDERER_TOKEN: 'render-tok-3Fq9Lm2Zx7Pv1Ns'
    links:
      - influxdb
    ports:
      - 3000:3000
    volumes:
      # Data persistency
      - /mnt/docker/iotserver/grafana/data:/var/lib/grafana
    networks:
      - app-net
      - backend-network

  # Headless Chromium that renders Grafana dashboards/panels to PNG for the kiosk.
  renderer:
    image: grafana/grafana-image-renderer:latest
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      resources:
        limits:
          # Cap the persistent Chromium; if it ever balloons past this it gets
          # OOM-killed and the on-failure policy restarts it clean.
          memory: 512M
    environment:
      ENABLE_METRICS: 'false'
      # Must match GF_RENDERING_RENDERER_TOKEN on the grafana service.
      AUTH_TOKEN: 'render-tok-3Fq9Lm2Zx7Pv1Ns'
      # Reuse one persistent browser: pages share the asset cache, so the Grafana
      # JS bundle isn't re-fetched/re-parsed on every render (the main cost of the
      # ~7s renders). If Chromium ever leaks past the 1G limit above it is
      # OOM-killed and the on-failure restart policy brings it back clean.
      RENDERING_MODE: reusable
    networks:
      - app-net
      - backend-network

  # Tiny static server that shows the rendered dashboard image and auto-refreshes.
  # The legacy iPad points its browser here; no Grafana JS runs on the iPad.
  # Files are delivered as swarm configs from ./kiosk in this repo, so a git push
  # (Portainer redeploy) updates the kiosk page — no host access / scp needed.
  kiosk:
    image: nginx:alpine
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
    ports:
      - 8088:80
    configs:
      - source: kiosk_index
        target: /usr/share/nginx/html/index.html
      - source: kiosk_manifest
        target: /usr/share/nginx/html/manifest.webmanifest
      - source: kiosk_appicon
        target: /usr/share/nginx/html/apple-touch-icon.png
      - source: kiosk_favicon
        target: /usr/share/nginx/html/fav32.png
    networks:
      - app-net
      - backend-network

# Swarm configs are immutable, so each name carries the file's content hash.
# When a kiosk file changes, bump the hash in its name (a new config is created
# and the service updated on the next deploy). Old configs can be pruned later.
configs:
  kiosk_index:
    name: kiosk_index_59c949cc
    file: ./kiosk/index.html
  kiosk_manifest:
    name: kiosk_manifest_5cc1ecd1
    file: ./kiosk/manifest.webmanifest
  kiosk_appicon:
    name: kiosk_appicon_36b514c0
    file: ./kiosk/apple-touch-icon.png
  kiosk_favicon:
    name: kiosk_favicon_ae30d113
    file: ./kiosk/fav32.png

networks:
  app-net:
    driver: overlay
  backend-network:
    external: true
